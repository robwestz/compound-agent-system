name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build catalog + bundle
        # data.public.js / recipes.public.js are committed sanitized snapshots.
        # Generate them locally: node build.mjs --sanitize && cp data.js data.public.js && cp recipes.js recipes.public.js
        # --skip-build skips running build.mjs (no ~/.claude/plugins on CI).
        run: node bundle.mjs --skip-build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          # Main app at the site root
          cp dist/skill-browser.html _site/index.html
          cp dist/assembler.html _site/assembler.html
          cp dist/playground.html _site/playground.html
          cp landing.html _site/landing.html
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
