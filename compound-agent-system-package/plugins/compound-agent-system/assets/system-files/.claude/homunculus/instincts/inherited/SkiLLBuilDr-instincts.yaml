# SkiLLBuilDr Workflow Add New Workspace Or Prototype

## Action

Follow the add-new-workspace-or-prototype workflow:
1. Create a new directory under workspaces/ with the workspace name.
2. Add agent logic files (e.g., agent/bdi.mjs, agent/llm.mjs, agent/assembler.mjs, agent/ranker.mjs).
3. Add prompts (e.g., prompts/rank-skills.md).
4. Add test cases (e.g., test-cases/*.json).
5. Add outputs for sample runs (e.g., outputs/<project>/CLAUDE.md, KICKOFF.md, REASONING.md, workflows/main.yaml).
6. Add or update package.json for the workspace.
7. Include documentation files (e.g., CLAUDE.md, KICKOFF.md).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: workspaces/<workspace-name>/agent/*.mjs, workspaces/<workspace-name>/prompts/*.md, workspaces/<workspace-name>/test-cases/*.json

